<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Magnifying glass -->
  <circle cx="180" cy="300" r="80" stroke="black" stroke-width="20" fill="none"/>
  <line x1="120" y1="360" x2="60" y2="420" stroke="black" stroke-width="20" stroke-linecap="round"/>

  <!-- Person 1 (left, tallest) -->
  <circle cx="220" cy="120" r="30" fill="black"/>
  <rect x="190" y="150" width="60" height="140" fill="black"/>

  <!-- Person 2 (middle) -->
  <circle cx="300" cy="170" r="25" fill="black"/>
  <rect x="275" y="195" width="50" height="120" fill="black"/>

  <!-- Person 3 (right) -->
  <circle cx="370" cy="210" r="20" fill="black"/>
  <rect x="350" y="230" width="40" height="90" fill="black"/>
</svg>
